---
# OpenBao unix user
openbao_group: openbao
openbao_user: openbao

# OpenBao package
openbao_version: 2.5.4
openbao_pkg: "bao_{{ openbao_version }}_Linux_{{ openbao_architecture }}.tar.gz"
openbao_tar_file_url: "https://github.com/openbao/openbao/releases/download/v{{ openbao_version }}/bao_{{ openbao_version }}_Linux_{{ openbao_architecture }}.tar.gz" # noqa: yaml[line-length]
openbao_checksum_file_url: "https://github.com/openbao/openbao/releases/download/v{{ openbao_version }}/checksums-linux.txt"

# OpenBao installation Paths
openbao_bin_path: /usr/local/bin
openbao_config_path: /etc/openbao
openbao_tls_path: /etc/openbao/tls
openbao_plugin_path: /etc/openbao/plugins
openbao_policy_path: /etc/openbao/policy
openbao_data_path: /var/lib/openbao
openbao_log_path: /var/log/openbao

# OpenBao config
openbao_main_config: "{{ openbao_config_path }}/openbao_main.json"
openbao_enable_telemetry: false
openbao_log: "{{ openbao_log_path }}/openbao.log"
openbao_http_proxy: ""
openbao_https_proxy: ""
openbao_no_proxy: ""
openbao_log_level: "{{ lookup('env', 'openbao_LOG_LEVEL') | default('info', true) }}"

# Enable tls
openbao_enable_tls: false
openbao_key: ""
openbao_cert: ""
custom_ca: false
openbao_ca: ""
# OpenBao service dns
openbao_dns: ""

openbao_port: 8200
openbao_protocol: "{% if openbao_enable_tls %}https{% else %}http{% endif %}"
openbao_iface: "{{ ansible_facts['default_ipv4']['interface'] }}"
openbao_hostname: "{{ openbao_dns | default(inventory_hostname, true) }}"
openbao_address: "{{ hostvars[inventory_hostname]['ansible_facts'][openbao_iface]['ipv4']['address'] }}"
openbao_cluster_address: "{{ openbao_address }}:{{ (openbao_port | int) + 1 }}"
openbao_cluster_url: "{{ openbao_protocol }}://{{ openbao_cluster_address }}"
openbao_api_url: "{{ openbao_protocol }}://{{ openbao_address }}:{{ openbao_port }}"
openbao_api_dns_url: "{{ openbao_protocol }}://{{ openbao_hostname }}:{{ openbao_port }}"

# Initialise OpenBao
openbao_init: false
openbao_tls_skip_verify: false
openbao_key_shares: 1
openbao_key_threshold: 1
openbao_save_keys_to_file: false
openbao_keys_output: "{{ openbao_config_path }}/unseal.json"
openbao_display_init_response: false

# Unseal OpenBao and install OpenBao unseal service
openbao_unseal: false
openbao_unseal_service: false

