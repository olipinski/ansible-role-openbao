---
- name: Test policies
  ansible.builtin.assert:
    that:
      - policy.name is defined
      - policy.json is defined
    quiet: true

- name: Get status of policy
  ansible.builtin.uri:
    url: "{{ openbao_api_dns_url }}/v1/sys/policy"
    method: GET
    headers:
      X-Vault-Token: "{{ openbao_root_token }}"
    validate_certs: "{{ openbao_tls_skip_verify | ternary('false', 'true') }}"
  failed_when:
    - false
  register: openbao_policies

- name: Create policy
  ansible.builtin.uri:
    url: "{{ openbao_api_dns_url }}/v1/sys/policy/{{ policy.name }}"
    method: POST
    headers:
      X-Vault-Token: "{{ openbao_root_token }}"
    body:
      name: "{{ policy.name }}"
      policy: "{{ policy.json }}"
    body_format: json
    validate_certs: "{{ openbao_tls_skip_verify | ternary('false', 'true') }}"
    status_code:
      - 200
      - 204
  when:
    - 'policy.name not in openbao_policies.json.data'
